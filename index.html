<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    background: rgb(109, 109, 233);
    font-family: Arial, Helvetica, sans-serif;
}

.main{
    width: 100%;
    min-height: 100vh;

    display: flex;
    align-items: center;
    flex-direction: column;

    padding-top: 60px;
}

h1{
    color: white;
    margin-bottom: 30px;
}

.inputSection{
    display: flex;
    gap: 10px;
}

#inputField{
    width: 280px;
    padding: 12px;

    border-radius: 8px;
    border: none;
    outline: none;

    font-size: 16px;
}

.addBtn{
    padding: 12px 18px;

    border: none;
    border-radius: 8px;

    background: black;
    color: white;

    cursor: pointer;
    transition: 0.3s;
}

.addBtn:hover{
    background: rgb(25, 25, 25);
}

.todoLists{
    width: 400px;
    margin-top: 30px;
}

.task{
    background: white;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 14px;
    margin-bottom: 15px;

    border-radius: 10px;

    transition: 0.3s;
}

.task:hover{
    transform: scale(1.02);
}

.task p{
    font-size: 17px;
    cursor: pointer;
}

.deleteBtn{
    padding: 8px 12px;

    border: none;
    border-radius: 6px;

    background: crimson;
    color: white;

    cursor: pointer;
}

.completed{
    text-decoration: line-through;
    opacity: 0.5;
}
  </style>
</head>
<body>

  <div class="main">

    <h1>Add Your Daily Tasks</h1>

    <div class="inputSection">
      <input 
        type="text" 
        placeholder="Please enter your task"
        id="inputField"
      >

      <button class="addBtn">
        Add
      </button>
    </div>

    <div class="todoLists">

    </div>

  </div>

  <script>
    let inputField = document.getElementById('inputField');

let addButton = document.querySelector('.addBtn');

let todoLists = document.querySelector('.todoLists');


// ADD TODO FUNCTION
const addTodo = () => {

    let taskValue = inputField.value.trim();

    
    // EMPTY VALIDATION
    if(taskValue === ''){
        alert('Please enter a task');
        return;
    }


    // CREATE TASK DIV
    let taskDiv = document.createElement('div');
    taskDiv.classList.add('task');


    // CREATE TASK TEXT
    let taskText = document.createElement('p');
    taskText.textContent = taskValue;


    // COMPLETE TASK
    taskText.addEventListener('click', () => {
        taskText.classList.toggle('completed');
    });


    // DELETE BUTTON
    let deleteButton = document.createElement('button');

    deleteButton.textContent = 'Delete';

    deleteButton.classList.add('deleteBtn');


    // DELETE TASK
    deleteButton.addEventListener('click', () => {
        taskDiv.remove();
    });


    // APPEND ELEMENTS
    taskDiv.append(taskText);
    taskDiv.append(deleteButton);

    todoLists.append(taskDiv);


    // CLEAR INPUT
    inputField.value = '';
};


// BUTTON CLICK
addButton.addEventListener('click', () => {
    addTodo();
});


// ENTER KEY SUPPORT
inputField.addEventListener('keypress', (event) => {

    if(event.key === 'Enter'){
        addTodo();
    }

});
  </script>
</body>
</html>
